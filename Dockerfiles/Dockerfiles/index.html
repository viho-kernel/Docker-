<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to My Nginx Site</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      background: rgba(0,0,0,0.4);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      max-width: 600px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      background: -webkit-linear-gradient(#fdfbfb, #ebedee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #ff6a00;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #ff4500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Welcome!</h1>
    <p>This site is powered by Nginx running inside Docker.</p>
    <a href="https://github.com/viho-kernel/Docker-" class="btn">View My Repo</a>
  </div>
</body>
</html>
